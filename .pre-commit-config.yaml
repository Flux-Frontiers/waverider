repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
        exclude: |
          (?x)^(
            (src|docs|papers)/.*\.(png|jpg|jpeg|gif|pdf)|
            benchmarks/canonical_tests/.*_results\.json
          )$
      - id: debug-statements

  # Pylint code quality checking
  - repo: https://github.com/PyCQA/pylint
    rev: v4.0.4
    hooks:
      - id: pylint
        args: ['--rcfile=pyproject.toml']
        files: '^src/'

  - repo: local
    hooks:
      - id: poetry-check
        name: poetry check
        entry: poetry check --lock
        language: system
        pass_filenames: false
        always_run: true
      - id: mypy
        name: mypy
        entry: poetry run mypy src/
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest
        entry: poetry run pytest --tb=short -q
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '(\.dockg|\.codekg)/'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
